{% extends 'base.html' %}

{% block title %}{% if object %}Editar Curso{% else %}Nuevo Curso{% endif %}{% endblock %}

{% block content %}
<h1>{% if object %}Editar: {{ object.nombre }}{% else %}Nuevo Curso{% endif %}</h1>
<form method="post" enctype="multipart/form-data" class="mt-4">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="mt-3">
        <button class="btn btn-success">Guardar</button>
        <a href="{% url 'lista_cursos' %}" class="btn btn-secondary ms-2">Cancelar</a>
    </div>
</form>
{% endblock %}
