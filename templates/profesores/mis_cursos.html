{% extends 'base.html' %}

{% block title %}Mis Cursos{% endblock %}

{% block content %}
<h1>Mis Cursos</h1>
<table class="table">
    <thead>
        <tr>
            <th>Curso</th>
            <th>Plazas</th>
            <th>Matriculados</th>
        </tr>
    </thead>
    <tbody>
        {% for curso in cursos %}
        <tr>
            <td>{{ curso.nombre }}</td>
            <td>{{ curso.plazas }}</td>
            <td>{{ curso.total_alumnos }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No tienes cursos asignados.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
