{% load django_bootstrap5 %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Gestión Formación{% endblock %}</title>
    {% bootstrap_css %}
</head>
<body>

        <div class="container">
            <a class="navbar-brand" href="/">Gestión Formación</a>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}

    </div>
    {% bootstrap_javascript %}

</html>
